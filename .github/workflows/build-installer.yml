name: Build Installer

# Builds the cross-platform GUI installer (packages/installer) for macOS, Windows,
# and Linux. Kept separate from release.yml so the working macOS desktop release
# flow is untouched. Trigger manually from the Actions tab; artifacts attach to
# the run. When a v* tag is pushed, the artifacts also upload to the release.

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional release tag to attach artifacts to (e.g. v0.2.0). Leave empty to only upload as workflow artifacts.'
        required: false
        type: string
  push:
    tags:
      - 'installer-v*'

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

permissions:
  contents: write

jobs:
  build-installer-macos:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: aarch64
          - target: x86_64-apple-darwin
            arch: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/installer/src-tauri
          key: installer-${{ matrix.target }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer (${{ matrix.arch }})
        run: bun run --cwd packages/installer tauri build --target ${{ matrix.target }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find packages/installer/src-tauri/target/${{ matrix.target }}/release/bundle -type f \
            \( -name "*.dmg" -o -name "*.app.tar.gz" \) \
            -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-macos-${{ matrix.arch }}
          path: artifacts/*

      - name: Attach to release
        if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-installer-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/installer/src-tauri
          key: installer-windows

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer
        run: bun run --cwd packages/installer tauri build --target x86_64-pc-windows-msvc

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p artifacts
          find packages/installer/src-tauri/target/x86_64-pc-windows-msvc/release/bundle -type f \
            \( -name "*.msi" -o -name "*.exe" \) \
            -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-windows-x64
          path: artifacts/*

      - name: Attach to release
        if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-installer-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/installer/src-tauri
          key: installer-linux

      - name: Install system dependencies
        run: |
          sudo apt-get update
          # Tauri 2 Linux deps per https://tauri.app/start/prerequisites/
          # (ubuntu-22.04). We intentionally use libayatana-appindicator3-dev
          # (not the legacy libappindicator3-dev — conflicts on 22.04) and
          # add libxdo-dev + libsoup-3.0-dev which Tauri 2 needs for IPC.
          sudo apt-get install -y \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libsoup-3.0-dev \
            patchelf

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build installer
        run: bun run --cwd packages/installer tauri build --target x86_64-unknown-linux-gnu

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find packages/installer/src-tauri/target/x86_64-unknown-linux-gnu/release/bundle -type f \
            \( -name "*.AppImage" -o -name "*.deb" \) \
            -exec cp {} artifacts/ \;
          ls -la artifacts/

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-linux-x64
          path: artifacts/*

      - name: Attach to release
        if: inputs.release_tag != '' || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
