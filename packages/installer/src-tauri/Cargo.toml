[package]
name = "opencode-cowork-installer"
version = "0.1.8"
edition = "2021"
publish = false

[lib]
name = "opencode_cowork_installer_lib"
crate-type = ["staticlib", "cdylib", "rlib"]
path = "src/lib.rs"

[[bin]]
name = "opencode-cowork-installer"
path = "src/main.rs"

[features]
default = []
devtools = ["tauri/devtools"]

[dependencies]
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tauri = { version = "2.9", features = [] }
tauri-plugin-dialog = "2.4"
tauri-plugin-shell = "2.3"
tokio = { version = "1.38", features = ["rt-multi-thread", "time", "io-util", "process", "sync"] }

[build-dependencies]
tauri-build = { version = "2.5", features = [] }
